<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCHELIN GUIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #E3F2FD;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }
header { display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }
h1 { 
    margin: 0; 
    font-family: 'Raleway', sans-serif; /* Raleway 폰트 적용 */
    font-weight: 800;                  /* Extrabold 두께 */
    font-size: 1.8rem;                 /* 눈에 잘 띄는 예쁜 크기 */
    color: #37474F; 
    letter-spacing: -0.5px;            /* 글자 간격을 좁혀 로고처럼 세련되게 */
}
.write-btn {
            background-color: #3F51B5; color: white; border: none; padding: 10px 18px;
            border-radius: 20px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.2s;
        }
        .write-btn:hover { background-color: #303F9F; }
        /* 버블 컨테이너 - 세로로 무한히 확장 가능하도록 수정 */
        #bubble-container { 
            position: relative; 
            width: 100%; 
            min-height: calc(100vh - 100px); 
            height: auto; /* 고정 높이를 해제하여 내용물에 따라 늘어나게 함 */
            box-sizing: border-box;
            padding-bottom: 80px; /* 맨 아래 버블과 하단 여백 보호 */
        }
        .bubble-item {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.2s; animation: float 4s ease-in-out infinite alternate;
        }
        .bubble-item:hover { transform: scale(1.05); z-index: 10; }
        .bubble {
            width: 85px; height: 85px; border-radius: 50%; background-size: cover; background-position: center;
            background-color: rgba(255, 255, 255, 0.5); border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); backdrop-filter: blur(2px); overflow: hidden;
        }
        .bubble.has-img { position: relative; }
        .bubble.has-img::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.25); }
        .bubble-info {
            margin-top: 6px; font-size: 0.75rem; color: #455A64; background: rgba(255, 255, 255, 0.6);
            padding: 2px 8px; border-radius: 10px; text-align: center; max-width: 90px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-10px); } }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { background-color: white; padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .modal h2 { margin-top: 0; font-size: 1.3rem; color: #37474F; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; color: #546E7A; margin-bottom: 4px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #CFD8DC; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
        .form-group textarea { height: 100px; resize: none; }
        .btn-area { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-submit { background-color: #3F51B5; color: white; }
        .btn-close { background-color: #ECEFF1; color: #546E7A; }
        .btn-delete { background-color: #FF5252; color: white; margin-right: auto; }
        .detail-img {width: 100%; max-height: 300px; object-fit: contain; background-color: #f0f0f0; border-radius: 8px; margin-bottom: 12px; }
        .detail-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .detail-author { font-size: 0.85rem; color: #78909C; margin-bottom: 12px; border-bottom: 1px solid #ECEFF1; padding-bottom: 8px; }
        .detail-content { font-size: 0.95rem; color: #37474F; white-space: pre-wrap; line-height: 1.5; }
            /* 사진 확대 모달 스타일 */
        .zoom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center;
            cursor: zoom-out;
        }
        .zoom-img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 4px; }
        
        /* 기존 상세보기 사진에 마우스를 올리면 돋보기 모양으로 변하게 수정 */
        .detail-img { cursor: zoom-in; }

    </style>

    <!-- 구글 Firebase 라이브러리 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <h1>MYCHELIN GUIDE🍽️</h1>
        <button class="write-btn" onclick="openModal('writeModal')">글쓰기</button>
    </header>

    <div id="bubble-container"></div>

    <!-- 1. 글쓰기 모달 -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <h2>맛집 등록하기</h2>
            <form id="postForm" onsubmit="savePost(event)">
                <div class="form-group">
                    <label>학번 이름</label>
                    <input type="text" id="author" placeholder="예: 10101 홍길동" required>
                </div>
                <div class="form-group">
                    <label>맛집 이름 (제목)</label>
                    <input type="text" id="title" placeholder="어디에 있는 어떤 맛집인가요?" required>
                </div>
                <div class="form-group">
                    <label>추천 이유 (내용)</label>
                    <textarea id="content" placeholder="맛있는 메뉴나 꿀팁을 적어주세요!" required></textarea>
                </div>
                <div class="form-group">
                    <label>맛집 사진</label>
                    <input type="file" id="image" accept="image/*" required>
                </div>
                <div class="btn-area">
                    <button type="button" class="btn btn-close" onclick="closeModal('writeModal')">취소</button>
                    <button type="submit" class="btn btn-submit" id="submitBtn">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 2. 상세보기 모달 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <img id="detailImg" class="detail-img" src="" alt="맛집 사진">
            <div id="detailTitle" class="detail-title"></div>
            <div id="detailAuthor" class="detail-author"></div>
            <div id="detailContent" class="detail-content"></div>
            <div class="btn-area">
                <button type="button" id="deleteBtn" class="btn btn-delete">삭제</button>
                <button type="button" class="btn btn-close" onclick="closeModal('detailModal')">닫기</button>
            </div> <div id="zoomModal" class="zoom-modal" onclick="closeZoom()">
        <img id="zoomImg" class="zoom-img" src="" alt="확대 이미지">
    </div>

        </div>
    </div>

    <script>
        // ★★★여기에 새로 만든 파이어베이스 설정을 넣어주세요!★★★
const firebaseConfig = {
  apiKey: "AIzaSyC6swyarCj33PWNxkZUfqE9U-Z3200udzo",
  authDomain: "mychelin-14f24.firebaseapp.com",
  projectId: "mychelin-14f24",
  storageBucket: "mychelin-14f24.firebasestorage.app",
  messagingSenderId: "671987526708",
  appId: "1:671987526708:web:134d4749ec92d0f3832e61"
};
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let posts = [];

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'writeModal') document.getElementById('postForm').reset();
        }

        db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            posts = [];
            snapshot.forEach((doc) => { posts.push({ id: doc.id, ...doc.data() }); });
            renderBubbles();
        }, (error) => {
            console.error("데이터 가져오기 실패:", error);
        });

// 4-50개 이상의 무한 스크롤 및 완벽 겹침 방지 렌더링 함수
        function renderBubbles() {
            const container = document.getElementById('bubble-container');
            container.innerHTML = '';
            
            const containerWidth = container.clientWidth;
            const cellWidth = 100; 
            const cellHeight = 130; 
            const cols = Math.floor(containerWidth / cellWidth) || 3;

            // 총 게시물 수에 맞춰 필요한 행(Rows)을 계산하여 세로 격자를 자동으로 무한 확장
            const totalItems = posts.length;
            const rows = Math.ceil(totalItems / cols) + 2; // 여유 공간 확보

            // 컨테이너 전체 높이를 격자 크기에 맞춰 강제로 늘려주어 스크롤바가 생기게 함
            container.style.height = `${rows * cellHeight}px`;
            
            let availableCells = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    availableCells.push({ r: r, c: c });
                }
            }

            posts.forEach((post, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'bubble-item';

                let hash = 0;
                for (let i = 0; i < post.id.length; i++) hash = post.id.charCodeAt(i) + ((hash << 5) - hash);
                
                // 수학적 매핑으로 절대 겹치지 않는 유일한 칸 선택
                let cellIndex = Math.abs(hash) % (availableCells.length || 1);
                let cell = availableCells[cellIndex] || { r: 0, c: 0 };
                
                if (availableCells.length > 0) {
                    availableCells.splice(cellIndex, 1);
                }

                // 칸 내부 미세 흔들림 효과
                const offsetX = (hash % 12); 
                const offsetY = ((hash >> 2) % 15);

                const posX = cell.c * cellWidth + ((containerWidth - (cols * cellWidth)) / 2) + offsetX;
                const posY = cell.r * cellHeight + 15 + offsetY;
                
                itemDiv.style.left = `${posX}px`;
                itemDiv.style.top = `${posY}px`;
                itemDiv.style.animationDelay = `${(hash % 10) * 0.2}s`;

                const bubble = document.createElement('div');
                bubble.className = 'bubble has-img';
                bubble.style.backgroundImage = `url(${post.image})`;

                const info = document.createElement('div');
                info.className = 'bubble-info';
                info.innerText = post.author;

                itemDiv.appendChild(bubble);
                itemDiv.appendChild(info);
                itemDiv.onclick = () => showDetail(index);
                container.appendChild(itemDiv);
            });
        }

        // 이미지 압축 및 업로드 함수 (동일하게 유지하되, 업로드 완료 시 깔끔하게 처리)
        function savePost(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "사진 압축 및 업로드 중...";
            submitBtn.disabled = true;

            const author = document.getElementById('author').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const imageFile = document.getElementById('image').files[0];

            if (!imageFile) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 400;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedDataURL = canvas.toDataURL('image/jpeg', 0.5);

                    db.collection("posts").add({
                        author: author,
                        title: title,
                        content: content,
                        image: compressedDataURL,
                        createdAt: new Date()
                    }).then(() => {
                        submitBtn.innerText = "등록하기";
                        submitBtn.disabled = false;
                        closeModal('writeModal');
                    }).catch((error) => {
                        alert("업로드 실패: " + error.message);
                        submitBtn.disabled = false;
                    });
                };
            };
            reader.readAsDataURL(imageFile);
        }

        function showDetail(index) {
            const post = posts[index];
            document.getElementById('detailImg').src = post.image;
            document.getElementById('detailTitle').innerText = post.title;
            document.getElementById('detailAuthor').innerText = `작성자: ${post.author}`;
            document.getElementById('detailContent').innerText = post.content;
            document.getElementById('deleteBtn').onclick = () => deletePost(post.id);
            
            // ★ 추가: 상세창의 사진을 누르면 확대 함수가 실행되도록 연결
            document.getElementById('detailImg').onclick = () => zoomImage(post.image);
            
            openModal('detailModal');
        }


        function deletePost(id) {
            if(confirm("이 맛집 게시글을 정말 삭제하시겠습니까?")) {
                db.collection("posts").doc(id).delete().then(() => { closeModal('detailModal'); });
            }
        }

        window.addEventListener('resize', renderBubbles);
                // 사진 확대 함수
        function zoomImage(imgSrc) {
            document.getElementById('zoomImg').src = imgSrc;
            document.getElementById('zoomModal').style.display = 'flex';
        }

        // 사진 축소(닫기) 함수
        function closeZoom() {
            document.getElementById('zoomModal').style.display = 'none';
        }

    </script>
</body>
</html>
